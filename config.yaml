search:
  max_results: 50

retriever:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  k: 5

summarizer:
  model: "t5-small"   # or "facebook/bart-large-cnn"
  t5:
    max_length: 100
    min_length: 30
    num_beams: 4
  bart:
    max_length: 150
    min_length: 40
    num_beams: 4
    length_penalty: 2.0
